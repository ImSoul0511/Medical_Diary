services:
  api:
    build: .
    container_name: medical_diary_backend
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: always
