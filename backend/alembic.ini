# Alembic Configuration - Medical Diary Backend
# Xem docs/SYSTEM_DESIGN_SSOT.md muc 6.3 de biet quy tac migration.

[alembic]
# Thu muc chua migration scripts
script_location = alembic

# Template cho revision ID - dung default
# file_template = %%(rev)s_%%(slug)s

# sqlalchemy.url se duoc override boi env.py (doc tu .env)
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
