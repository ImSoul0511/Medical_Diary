# Alembic Configuration — Medical Diary Backend
# Xem docs/SYSTEM_DESIGN_SSOT.md mục 6.3 để biết quy tắc migration.

[alembic]
# Thư mục chứa migration scripts
script_location = alembic

# Template cho revision ID — dùng default
# file_template = %%(rev)s_%%(slug)s

# sqlalchemy.url sẽ được override bởi env.py (đọc từ .env)
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
